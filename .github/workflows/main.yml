name: AI Agent Workspace Editor

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Instructions for the agent (e.g., "Add a logo and update the README")'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run AI Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e  # Exit immediately if any command fails
          echo "Starting the agent with prompt: ${{ github.event.inputs.prompt }}"
          
          # Replace with your actual agent command
          # python agent.py --model "gpt-4o" --prompt "${{ github.event.inputs.prompt }}"
          # or
          # npx copilot-cli run --task "n8n-annotation" --prompt "${{ github.event.inputs.prompt }}"

      - name: Create Pull Request with changes
        if: success()  # Only run if agent succeeds
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "Automated changes made by AI Agent: ${{ github.event.inputs.prompt }}"
          title: "AI Agent: ${{ github.event.inputs.prompt }}"
          body: |
            Automated workflow triggered with prompt:
            ```
            ${{ github.event.inputs.prompt }}
            ```
          branch: ai-agent-${{ github.run_id }}
          delete-branch: true
